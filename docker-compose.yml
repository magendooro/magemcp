# =============================================================================
# MageMCP — Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env   # fill in your Magento credentials
#   docker compose up -d
#   docker compose logs -f magemcp

services:
  magemcp:
    build: .
    env_file: .env
    # stdio transport requires stdin to stay open
    stdin_open: true
    tty: true
    # The container needs outbound network access to reach the Magento instance.
    # Default bridge network is sufficient.
    #
    # When HTTP transport is added, expose the port:
    #   ports:
    #     - "8000:8000"

  # Development profile — mounts source into builder stage for live editing
  # Usage: docker compose --profile dev up magemcp-dev --build
  # The builder stage has hatchling available so editable install works.
  magemcp-dev:
    build:
      context: .
      target: builder
    env_file: .env
    stdin_open: true
    tty: true
    working_dir: /build
    volumes:
      - ./src:/build/src:ro
      - ./pyproject.toml:/build/pyproject.toml:ro
      - ./README.md:/build/README.md:ro
    entrypoint: ["/bin/sh", "-c", "pip install -q -e . && magemcp"]
    profiles:
      - dev
