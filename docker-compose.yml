# =============================================================================
# MageMCP — Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env   # fill in MAGENTO_BASE_URL and MAGEMCP_ADMIN_TOKEN
#   docker compose up -d
#   docker compose logs -f magemcp

services:
  magemcp:
    build: .
    environment:
      - MAGENTO_BASE_URL=${MAGENTO_BASE_URL}
      - MAGEMCP_ADMIN_TOKEN=${MAGEMCP_ADMIN_TOKEN}
      - MAGENTO_STORE_CODE=${MAGENTO_STORE_CODE:-default}
      - MAGENTO_CUSTOMER_TOKEN=${MAGENTO_CUSTOMER_TOKEN:-}
      - MAGEMCP_LOG_LEVEL=${MAGEMCP_LOG_LEVEL:-INFO}
      - MAGEMCP_SKIP_CONFIRMATION=${MAGEMCP_SKIP_CONFIRMATION:-}
    # stdio transport requires stdin to stay open
    stdin_open: true
    tty: true
    # The container needs outbound network access to reach the Magento instance.
    # Default bridge network is sufficient.
    #
    # When HTTP transport is added, expose the port:
    #   ports:
    #     - "8000:8000"

  # Development profile — mounts source into builder stage for live editing
  # Usage: docker compose --profile dev up magemcp-dev --build
  # The builder stage has hatchling available so editable install works.
  magemcp-dev:
    build:
      context: .
      target: builder
    environment:
      - MAGENTO_BASE_URL=${MAGENTO_BASE_URL}
      - MAGEMCP_ADMIN_TOKEN=${MAGEMCP_ADMIN_TOKEN}
      - MAGENTO_STORE_CODE=${MAGENTO_STORE_CODE:-default}
      - MAGENTO_CUSTOMER_TOKEN=${MAGENTO_CUSTOMER_TOKEN:-}
      - MAGEMCP_LOG_LEVEL=${MAGEMCP_LOG_LEVEL:-DEBUG}
      - MAGEMCP_SKIP_CONFIRMATION=${MAGEMCP_SKIP_CONFIRMATION:-}
    stdin_open: true
    tty: true
    working_dir: /build
    volumes:
      - ./src:/build/src:ro
      - ./pyproject.toml:/build/pyproject.toml:ro
      - ./README.md:/build/README.md:ro
    entrypoint: ["/bin/sh", "-c", "pip install -q -e . && magemcp"]
    profiles:
      - dev
